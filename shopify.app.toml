# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "7dcaa4c0997790c99be62840f72b2ac8"
name = "Restockly – Stock Alerts"
application_url = "https://notify-out-stock-production-bd8c.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

# ================================
# 🔁 APP PROXY (Storefront → App)
# ================================
[app_proxy]
url = "https://notify-out-stock-production-bd8c.up.railway.app"
subpath = "notify-out-stock"
prefix = "apps"

# ================================
# 🔔 WEBHOOKS
# ================================
[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory-update"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products-update"


# ================================
# 🔐 API PERMISSIONS
# ================================
[access_scopes]
scopes = "write_products,read_products,read_inventory"

# ================================
# 🔑 AUTH CALLBACK
# ================================
[auth]
redirect_urls = [
  "https://notify-out-stock-production-bd8c.up.railway.app/auth/callback"
]
